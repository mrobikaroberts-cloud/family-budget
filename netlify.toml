[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Firebase environment variables — set these in the Netlify dashboard
# (Site configuration > Environment variables):
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  # Firebase web API keys are public-facing (not secret server keys).
  # Tell Netlify's secrets scanner to allow this value in the built JS bundle.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDBVd_ky_xgMoalJ1m9145BqYOsYCCFVRI"
